services:
  - type: web
    name: crypto-bot-paper-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/run_ws_dashboard.py --config config/btc-volatile.json --provider binance --symbol BTCUSDT --interval 1m --mainnet --host 0.0.0.0 --port $PORT --only-actions --log-file logs/btc-trades.jsonl
    autoDeploy: true
    healthCheckPath: /api/state
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11

  - type: worker
    name: crypto-bot-eth
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/run_ws_paper.py --config config/eth-volatile.json --provider binance --symbol ETHUSDT --interval 1m --mainnet --only-actions --log-file logs/eth-trades.jsonl
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11

  - type: worker
    name: crypto-bot-sol
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/run_ws_paper.py --config config/sol-volatile.json --provider binance --symbol SOLUSDT --interval 1m --mainnet --only-actions --log-file logs/sol-trades.jsonl
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11

  - type: worker
    name: crypto-bot-xrp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/run_ws_paper.py --config config/xrp-volatile.json --provider binance --symbol XRPUSDT --interval 1m --mainnet --only-actions --log-file logs/xrp-trades.jsonl
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11