services:
  - type: web
    name: crypto-bot-paper-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/run_multi_coin_dashboard.py --host 0.0.0.0 --port $PORT --mainnet --only-actions --warmup-candles 10
    autoDeploy: true
    healthCheckPath: /api/state
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11