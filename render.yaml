services:
  - type: web
    name: crypto-bot-paper-dashboard
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python3 scripts/run_ws_dashboard.py --config config/btc-volatile.json --provider binance --symbol BTCUSDT --interval 5m --mainnet --host 0.0.0.0 --port $PORT --only-actions --warmup-candles 10
    autoDeploy: true
    healthCheckPath: /api/state
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
